<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xinver Corp | Synthetic Indices Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --dark: #020617; --slate: #f8fafc; }
        body { background: var(--slate); color: var(--dark); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .ticker-wrap { background: var(--dark); color: var(--emerald); overflow: hidden; white-space: nowrap; padding: 10px 0; border-bottom: 2px solid var(--emerald); }
        .ticker { display: inline-block; animation: ticker 40s linear infinite; font-family: monospace; font-weight: bold; font-size: 12px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .chart-container { flex: 1; position: relative; background: #131722; border-radius: 24px; margin: 20px; overflow: hidden; border: 1px solid #363a45; }
        iframe { width: 100%; height: 100%; border: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-50 p-6">
        <div class="glass p-10 w-full max-w-sm text-center shadow-2xl border-t-4 border-emerald-500 rounded-[2rem]">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Xinver <span class="text-emerald-500 italic">Corp</span></h1>
            <p class="text-[10px] font-bold text-slate-400 tracking-[0.4em] uppercase mt-2 mb-10">Trading Terminal Access</p>
            <div class="space-y-4">
                <input type="text" id="u" placeholder="Usuario" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 transition">
                <input type="password" id="p" placeholder="Contraseña" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 transition">
                <button onclick="access()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl uppercase text-xs tracking-widest hover:bg-emerald-700 transition shadow-lg">Entrar al Mercado</button>
            </div>
        </div>
    </div>

    <div id="terminal" class="hidden flex flex-col h-full">
        <div class="ticker-wrap">
            <div class="ticker">
                CRASH 1000: SELL PRESSURE • BOOM 1000: BUY ZONE • CRASH 500: STABLE • BOOM 500: SPIKE ALERT • TRM: $3.600 • XINVER CORP: ALGORITHMIC TRADING READY • 
            </div>
        </div>

        <header class="p-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-2xl font-black text-slate-900 tracking-tighter uppercase">Xinver <span class="text-emerald-500">Analytics</span></h2>
                <p class="text-[9px] text-emerald-600 font-bold tracking-[0.4em] uppercase">Synthetic Indices Node</p>
            </div>
            
            <div class="flex gap-2">
                <button onclick="changeChart('C1000')" class="px-4 py-2 bg-red-100 text-red-600 rounded-xl text-xs font-bold hover:bg-red-200 transition">CRASH 1000</button>
                <button onclick="changeChart('B1000')" class="px-4 py-2 bg-emerald-100 text-emerald-600 rounded-xl text-xs font-bold hover:bg-emerald-200 transition">BOOM 1000</button>
                <button onclick="location.reload()" class="p-2 bg-white border border-slate-200 rounded-xl shadow-sm">🔒</button>
            </div>
        </header>

        <div class="chart-container shadow-2xl">
            <iframe id="tradingview_chart" 
                src="https://s.tradingview.com/widgetembed/?frameElementId=tradingview_762ae&symbol=DERIV%3ACRASH1000&interval=1&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=dark&style=1&timezone=Etc%2FUTC&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=es&utm_source=xinver.com&utm_medium=widget&utm_campaign=chart&utm_term=DERIV%3ACRASH1000">
            </iframe>
        </div>

        <footer class="p-4 text-center">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.5em]">Xinver Corporation Intelligence Unit © 2026</p>
        </footer>
    </div>

    <script>
        let uS = ""; let pS = "";

        function access() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            if(!uS) { uS = u; pS = p; }
            if(u === uS && p === pS) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('terminal').classList.remove('hidden');
            }
        }

        function changeChart(symbol) {
            const chart = document.getElementById('tradingview_chart');
            // Cambiamos el símbolo en el Iframe
            let target = symbol === 'C1000' ? 'DERIV%3ACRASH1000' : 'DERIV%3ABOOM1000';
            chart.src = `https://s.tradingview.com/widgetembed/?symbol=${target}&interval=1&theme=dark&locale=es`;
        }
    </script>
</body>
</html>
